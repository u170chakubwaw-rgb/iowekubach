<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>iowekubach</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 14'><rect fill='%230b1020' width='14' height='14'/><path fill='%233b82f6' d='M12 8.5H2c-0.55228 0 -1 -0.44772 -1 -1V2c0 -0.55228 0.44772 -1 1 -1h10c0.5523 0 1 0.44772 1 1v5.5c0 0.55228 -0.4477 1 -1 1Z'/><rect x='1' y='9' width='12' height='4' rx='0.5' fill='%23ef4444' opacity='0.7'/></svg>" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <header class="hero-card">
            <p class="eyebrow">iouekubach.live</p>
            <h1>Kto i ile mi wisi 💵</h1>
            
        </header>

        <section class="panel summary-panel">
            <div>
                <span class="label">
                    <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v12M9 9h6a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-2a2 2 0 0 1 2-2z"></path>
                    </svg>
                    Łącznie do odzyskania
                </span>
                <strong id="total-balance">0 zł</strong>
            </div>
            <div>
                <span class="label">
                    <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Osób na liście
                </span>
                <strong id="people-count">0</strong>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>Lista osób</h2>
            </div>
            <div id="people-container" class="people-list"></div>
        </section>

        <section id="details-view" class="panel details-panel hidden">
            <div class="panel-header details-top">
                <div class="person-header">
                    <img id="selected-person-avatar" class="person-avatar person-avatar-large" src="assets/Jan P.jpg" alt="Jan P.">
                    <p class="eyebrow">Szczegóły</p>
                    <h2 id="selected-person-name">Osoba</h2>
                    <p id="selected-person-balance" class="balance-text"></p>
                </div>
                <button id="close-btn" class="ghost-btn" type="button">Zamknij</button>
            </div>

            <div class="history-block">
                <h3>Historia transakcji</h3>
                <div id="history-list" class="history-list"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
